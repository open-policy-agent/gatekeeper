name: release-sample-images
on:
  push:
    tags:
      - 'v*'

permissions: read-all

jobs:
  publish-sample-images:
    name: "Publish Sample Images"
    runs-on: oracle-vm-8cpu-32gb-x86-64
    permissions:
      contents: read
      packages: write
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'open-policy-agent/gatekeeper'
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish fake-reader image
        run: |
          make docker-buildx-fake-reader \
            PLATFORM="linux/amd64,linux/arm64" \
            OUTPUT_TYPE=type=registry \
            GENERATE_ATTESTATIONS=true

      - name: Publish fake-subscriber image
        run: |
          make docker-buildx-fake-subscriber \
            PLATFORM="linux/amd64,linux/arm64" \
            OUTPUT_TYPE=type=registry \
            GENERATE_ATTESTATIONS=true

name: release-sample-images
on:
  push:
    tags:
      - 'v*'

permissions: read-all

jobs:
  publish-sample-images:
    name: "Publish Sample Images"
    runs-on: oracle-vm-8cpu-32gb-x86-64
    permissions:
      contents: read
      packages: write
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'open-policy-agent/gatekeeper'
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish fake-reader image
        run: |
          make docker-buildx-fake-reader \
            PLATFORM="linux/amd64,linux/arm64" \
            OUTPUT_TYPE=type=registry \
            GENERATE_ATTESTATIONS=true

      - name: Publish fake-subscriber image
        run: |
          make docker-buildx-fake-subscriber \
            PLATFORM="linux/amd64,linux/arm64" \
            OUTPUT_TYPE=type=registry \
            GENERATE_ATTESTATIONS=true

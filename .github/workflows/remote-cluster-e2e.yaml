name: remote_cluster_e2e
on:
  push:
    branches:
      - master
      - release-*
    paths:
      - "pkg/routing/**"
      - "pkg/controller/controller.go"
      - "apis/status/**"
      - "pkg/controller/**/**.go"
      - "pkg/webhook/**"
      - "main.go"
      - "test/bats/tests/remote-cluster/**"
      - ".github/workflows/remote-cluster-e2e.yaml"
  pull_request:
    paths:
      - "pkg/routing/**"
      - "pkg/controller/controller.go"
      - "apis/status/**"
      - "pkg/controller/**/**.go"
      - "pkg/webhook/**"
      - "main.go"
      - "test/bats/tests/remote-cluster/**"
      - ".github/workflows/remote-cluster-e2e.yaml"

permissions: read-all

env:
  GATEKEEPER_NAMESPACE: gatekeeper-system
  MANAGEMENT_CLUSTER: management
  NESTED_CLUSTER: nested
  GATEKEEPER_IMAGE: gatekeeper:remote-e2e

jobs:
  remote_cluster_e2e:
    name: "Remote Cluster E2E (Kind) - K8s ${{ matrix.KUBERNETES_VERSION }}"
    runs-on: oracle-vm-8cpu-32gb-x86-64
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        KUBERNETES_VERSION: ["1.31.6", "1.32.3", "1.33.2"] # Latest available versions of Kubernetes at - https://hub.docker.com/r/kindest/node/tags
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install dependencies
        run: |
          mkdir -p $GITHUB_WORKSPACE/bin
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
          make e2e-dependencies KUBERNETES_VERSION=${{ matrix.KUBERNETES_VERSION }}
          
          # Verify installations
          kind version
          kubectl version --client

      - name: Create management cluster (runs Gatekeeper)
        run: |
          kind create cluster --name ${{ env.MANAGEMENT_CLUSTER }} \
            --image kindest/node:v${{ matrix.KUBERNETES_VERSION }} \
            --wait 120s
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} cluster-info

      - name: Create nested cluster (target for policies)
        run: |
          kind create cluster --name ${{ env.NESTED_CLUSTER }} \
            --image kindest/node:v${{ matrix.KUBERNETES_VERSION }} \
            --wait 120s
          kubectl --context kind-${{ env.NESTED_CLUSTER }} cluster-info

      - name: Get cluster IPs for inter-cluster communication
        id: cluster-ips
        run: |
          MGMT_IP=$(docker inspect ${{ env.MANAGEMENT_CLUSTER }}-control-plane -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          NESTED_IP=$(docker inspect ${{ env.NESTED_CLUSTER }}-control-plane -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          
          # Validate IPs were retrieved successfully
          [[ -n "$MGMT_IP" ]] || { echo "Failed to get management cluster IP"; exit 1; }
          [[ -n "$NESTED_IP" ]] || { echo "Failed to get nested cluster IP"; exit 1; }
          
          echo "mgmt_ip=$MGMT_IP" >> $GITHUB_OUTPUT
          echo "nested_ip=$NESTED_IP" >> $GITHUB_OUTPUT
          echo "Management cluster IP: $MGMT_IP"
          echo "Nested cluster IP: $NESTED_IP"

      - name: Generate kubeconfig for nested cluster (with internal IP)
        run: |
          kind get kubeconfig --name ${{ env.NESTED_CLUSTER }} | \
            sed "s|https://127.0.0.1:[0-9]*|https://${{ steps.cluster-ips.outputs.nested_ip }}:6443|g" \
            > /tmp/nested-kubeconfig.yaml
          echo "Generated kubeconfig with internal IP"
          grep -q server /tmp/nested-kubeconfig.yaml && echo "Server endpoint present in kubeconfig"

      - name: Generate TLS certificates for webhook
        run: |
          mkdir -p /tmp/gk-certs
          MGMT_IP="${{ steps.cluster-ips.outputs.mgmt_ip }}"
          
          # Generate CA
          openssl genrsa -out /tmp/gk-certs/ca.key 2048
          openssl req -x509 -new -nodes -key /tmp/gk-certs/ca.key \
            -subj "/CN=gatekeeper-ca" -days 365 -out /tmp/gk-certs/ca.crt
          
          # Generate server cert with SANs
          openssl genrsa -out /tmp/gk-certs/tls.key 2048
          cat > /tmp/gk-certs/csr.conf <<EOF
          [req]
          req_extensions = v3_req
          distinguished_name = dn
          [dn]
          [v3_req]
          basicConstraints = CA:FALSE
          keyUsage = digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth
          subjectAltName = @alt_names
          [alt_names]
          DNS.1 = gatekeeper-webhook-service.${{ env.GATEKEEPER_NAMESPACE }}.svc
          IP.1 = ${MGMT_IP}
          EOF
          # Remove leading whitespace from the config file
          sed -i 's/^          //' /tmp/gk-certs/csr.conf
          
          openssl req -new -key /tmp/gk-certs/tls.key \
            -subj "/CN=gatekeeper-webhook" \
            -out /tmp/gk-certs/tls.csr \
            -config /tmp/gk-certs/csr.conf
          
          openssl x509 -req -in /tmp/gk-certs/tls.csr \
            -CA /tmp/gk-certs/ca.crt -CAkey /tmp/gk-certs/ca.key \
            -CAcreateserial -out /tmp/gk-certs/tls.crt -days 365 \
            -extensions v3_req -extfile /tmp/gk-certs/csr.conf
          
          echo "TLS certificates generated successfully"
          openssl x509 -in /tmp/gk-certs/tls.crt -text -noout | grep -A1 "Subject Alternative Name"

      - name: Build Gatekeeper image
        run: |
          make docker-buildx IMG=${{ env.GATEKEEPER_IMAGE }}

      - name: Load image into management cluster
        run: |
          kind load docker-image ${{ env.GATEKEEPER_IMAGE }} --name ${{ env.MANAGEMENT_CLUSTER }}
          echo "Image loaded into management cluster"

      - name: Deploy status CRDs to management cluster
        run: |
          for f in config/crd/bases/*podstatus*.yaml; do
            [[ "$(basename "$f")" == _* ]] && continue
            kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} apply -f "$f"
          done
          echo "Status CRDs deployed to management cluster"

      - name: Deploy user facing CRDs to nested cluster
        run: |
          for f in config/crd/bases/*.yaml; do
            [[ "$(basename "$f")" == _* ]] && continue
            [[ "$(basename "$f")" == *podstatus* ]] && continue
            kubectl --context kind-${{ env.NESTED_CLUSTER }} apply -f "$f"
          done
          kubectl --context kind-${{ env.NESTED_CLUSTER }} apply \
            -f charts/gatekeeper/crds/provider-customresourcedefinition.yaml
          kubectl --context kind-${{ env.NESTED_CLUSTER }} wait \
            --for=condition=established --timeout=60s \
            crd/constrainttemplates.templates.gatekeeper.sh
          echo "User facing CRDs deployed to nested cluster"

      - name: Create gatekeeper-system namespace in management cluster
        run: |
          # Only the management cluster needs gatekeeper-system
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} create namespace ${{ env.GATEKEEPER_NAMESPACE }}

      - name: Create secrets in management cluster
        run: |
          # Kubeconfig secret for accessing nested cluster
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} create secret generic nested-kubeconfig \
            --from-file=kubeconfig=/tmp/nested-kubeconfig.yaml \
            -n ${{ env.GATEKEEPER_NAMESPACE }}
          
          # TLS certificate secret
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} create secret generic gatekeeper-webhook-server-cert \
            --from-file=tls.crt=/tmp/gk-certs/tls.crt \
            --from-file=tls.key=/tmp/gk-certs/tls.key \
            --from-file=ca.crt=/tmp/gk-certs/ca.crt \
            -n ${{ env.GATEKEEPER_NAMESPACE }}
          
          echo "Secrets created"

      - name: Deploy Gatekeeper to management cluster
        run: |
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} apply \
            -f test/bats/tests/remote-cluster/gatekeeper-remote-cluster-deployment.yaml
          
          echo "Gatekeeper deployment created"

      - name: Configure webhook in nested cluster
        run: |
          MGMT_IP="${{ steps.cluster-ips.outputs.mgmt_ip }}"
          CA_BUNDLE=$(base64 -w0 < /tmp/gk-certs/ca.crt)
          
          kubectl --context kind-${{ env.NESTED_CLUSTER }} apply -f - <<EOF
          apiVersion: admissionregistration.k8s.io/v1
          kind: ValidatingWebhookConfiguration
          metadata:
            name: gatekeeper-validating-webhook-configuration
          webhooks:
          - name: validation.gatekeeper.sh
            admissionReviewVersions: ["v1", "v1beta1"]
            clientConfig:
              url: https://${MGMT_IP}:30443/v1/admit
              caBundle: ${CA_BUNDLE}
            rules:
            - apiGroups: ["*"]
              apiVersions: ["*"]
              operations: ["CREATE", "UPDATE"]
              resources: ["namespaces"]
            failurePolicy: Fail
            sideEffects: None
            timeoutSeconds: 10
            namespaceSelector:
              matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values: ["kube-system", "kube-public", "kube-node-lease", "${{ env.GATEKEEPER_NAMESPACE }}"]
          EOF
          
          echo "Webhook configured in nested cluster"

      - name: Wait for Gatekeeper pod to be ready
        run: |
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} -n ${{ env.GATEKEEPER_NAMESPACE }} \
            wait --for=condition=Ready --timeout=120s pod -l control-plane=controller-manager
          
          echo "Gatekeeper pod is ready"

          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} -n ${{ env.GATEKEEPER_NAMESPACE }} \
            wait --for=condition=Ready --timeout=120s pod -l control-plane=audit-controller
          
          echo "Gatekeeper audit pod is ready"

      - name: Verify Gatekeeper pod is healthy (no crash loops)
        run: |
          PHASE=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get pods \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -l control-plane=controller-manager \
            -o jsonpath='{.items[0].status.phase}')
          
          RESTARTS=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get pods \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -l control-plane=controller-manager \
            -o jsonpath='{.items[0].status.containerStatuses[0].restartCount}')
          
          echo "Pod phase: $PHASE"
          echo "Restart count: $RESTARTS"
          
          [[ "$PHASE" == "Running" ]] || { echo "Pod not running"; exit 1; }
          [[ "$RESTARTS" -lt 3 ]] || { echo "Too many restarts"; exit 1; }

      - name: Deploy ConstraintTemplate to nested cluster
        run: |
          kubectl --context kind-${{ env.NESTED_CLUSTER }} apply -f test/bats/tests/remote-cluster/k8srequiredlabels_template.yaml
          
          # Wait for CRD to be created
          for i in {1..60}; do
            if kubectl --context kind-${{ env.NESTED_CLUSTER }} get crd k8srequiredlabels.constraints.gatekeeper.sh &>/dev/null; then
              echo "Constraint CRD created successfully"
              break
            fi
            echo "Waiting for constraint CRD... ($i/60)"
            sleep 2
          done
          
          kubectl --context kind-${{ env.NESTED_CLUSTER }} get crd k8srequiredlabels.constraints.gatekeeper.sh

      - name: Verify ConstraintTemplatePodStatus on management cluster
        run: |
          # Wait for status to be created on management cluster
          for i in {1..60}; do
            NAME=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constrainttemplatepodstatuses \
              -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [[ -n "$NAME" ]]; then
              echo "ConstraintTemplatePodStatus found: $NAME"
              break
            fi
            echo "Waiting for ConstraintTemplatePodStatus... ($i/60)"
            sleep 2
          done
          
          # Check OwnerReferences exist (pod is on management cluster)
          REFS=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constrainttemplatepodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.items[0].metadata.ownerReferences}')
          
          echo "OwnerReferences: '$REFS'"
          
          if [[ -n "$REFS" && "$REFS" != "null" ]]; then
            echo "✓ OwnerReferences present - GC will clean up on pod restart"
          else
            echo "✗ No OwnerReferences found - expected OwnerReferences on management cluster!"
            exit 1
          fi
          
          # Verify NO PodStatuses on nested cluster
          NESTED_COUNT=$(kubectl --context kind-${{ env.NESTED_CLUSTER }} get constrainttemplatepodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} --no-headers 2>/dev/null | wc -l || echo "0")
          if [[ "$NESTED_COUNT" -eq 0 ]]; then
            echo "✓ No PodStatuses on nested cluster"
          else
            echo "✗ Found $NESTED_COUNT PodStatuses on nested cluster - should be on management cluster only!"
            exit 1
          fi

      - name: Deploy Constraint to nested cluster
        run: |
          kubectl --context kind-${{ env.NESTED_CLUSTER }} apply -f test/bats/tests/remote-cluster/k8srequiredlabels_constraint.yaml
          
          # Wait for constraint to be enforced
          for i in {1..60}; do
            ENFORCED=$(kubectl --context kind-${{ env.NESTED_CLUSTER }} get k8srequiredlabels require-test-label \
              -o jsonpath='{.status.byPod[0].enforced}' 2>/dev/null || echo "")
            if [[ "$ENFORCED" == "true" ]]; then
              echo "Constraint is enforced"
              break
            fi
            echo "Waiting for constraint to be enforced... ($i/60)"
            sleep 2
          done
          
          kubectl --context kind-${{ env.NESTED_CLUSTER }} get k8srequiredlabels require-test-label -o yaml

      - name: Verify ConstraintPodStatus on management cluster
        run: |
          # Wait for status to be created on management cluster
          for i in {1..60}; do
            NAME=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constraintpodstatuses \
              -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [[ -n "$NAME" ]]; then
              echo "ConstraintPodStatus found: $NAME"
              break
            fi
            echo "Waiting for ConstraintPodStatus... ($i/60)"
            sleep 2
          done
          
          # Check OwnerReferences exist (pod is on management cluster)
          REFS=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constraintpodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.items[0].metadata.ownerReferences}')
          
          echo "OwnerReferences: '$REFS'"
          
          if [[ -n "$REFS" && "$REFS" != "null" ]]; then
            echo "✓ OwnerReferences present - GC will clean up on pod restart"
          else
            echo "✗ No OwnerReferences found - expected OwnerReferences on management cluster!"
            exit 1
          fi

      - name: Verify aggregated status on nested cluster
        run: |
          BY_POD=$(kubectl --context kind-${{ env.NESTED_CLUSTER }} get constrainttemplates k8srequiredlabels \
            -o jsonpath='{.status.byPod}' 2>/dev/null || echo "")
          if [[ -n "$BY_POD" && "$BY_POD" != "[]" ]]; then
            echo "Aggregated .status.byPod is populated on nested cluster"
          else
            echo ".status.byPod is empty on nested cluster"
            exit 1
          fi
          
          CSTR_BY_POD=$(kubectl --context kind-${{ env.NESTED_CLUSTER }} get k8srequiredlabels require-test-label \
            -o jsonpath='{.status.byPod}' 2>/dev/null || echo "")
          if [[ -n "$CSTR_BY_POD" && "$CSTR_BY_POD" != "[]" ]]; then
            echo "Constraint .status.byPod is populated on nested cluster"
          else
            echo "Constraint .status.byPod is empty"
            exit 1
          fi

      - name: Verify ValidatingAdmissionPolicy generated on nested cluster
        run: |
          # This asserts the CEL/VAP generation path works end-to-end across the cluster split.
          VAP_NAME="gatekeeper-k8srequiredlabels"
          VAPB_NAME="gatekeeper-k8srequiredlabels-require-test-label"

          for i in {1..60}; do
            if kubectl --context kind-${{ env.NESTED_CLUSTER }} get validatingadmissionpolicy "$VAP_NAME" &>/dev/null; then
              echo "✓ ValidatingAdmissionPolicy '$VAP_NAME' generated on nested cluster"
              break
            fi
            echo "Waiting for ValidatingAdmissionPolicy... ($i/60)"
            sleep 2
          done
          kubectl --context kind-${{ env.NESTED_CLUSTER }} get validatingadmissionpolicy "$VAP_NAME" -o name || {
            echo "✗ ValidatingAdmissionPolicy '$VAP_NAME' not found on nested cluster"
            exit 1
          }

          for i in {1..60}; do
            if kubectl --context kind-${{ env.NESTED_CLUSTER }} get validatingadmissionpolicybinding "$VAPB_NAME" &>/dev/null; then
              echo "✓ ValidatingAdmissionPolicyBinding '$VAPB_NAME' generated on nested cluster"
              break
            fi
            echo "Waiting for ValidatingAdmissionPolicyBinding... ($i/60)"
            sleep 2
          done
          BOUND_POLICY=$(kubectl --context kind-${{ env.NESTED_CLUSTER }} get validatingadmissionpolicybinding "$VAPB_NAME" \
            -o jsonpath='{.spec.policyName}' 2>/dev/null || echo "")
          if [[ "$BOUND_POLICY" == "$VAP_NAME" ]]; then
            echo "✓ Binding references the generated policy ($BOUND_POLICY)"
          else
            echo "✗ Binding policyName '$BOUND_POLICY' does not reference '$VAP_NAME'"
            exit 1
          fi

          # Verify the generated VAP/VAPB did NOT leak onto the management cluster.
          MGMT_VAP=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get validatingadmissionpolicy "$VAP_NAME" --no-headers 2>/dev/null | wc -l || echo "0")
          if [[ "$MGMT_VAP" -eq 0 ]]; then
            echo "✓ No generated ValidatingAdmissionPolicy on management cluster"
          else
            echo "✗ Found generated ValidatingAdmissionPolicy on management cluster - should be on target only!"
            exit 1
          fi

      - name: Verify external data Provider routing
        run: |
          CA_BUNDLE=$(base64 -w0 < /tmp/gk-certs/ca.crt)

          kubectl --context kind-${{ env.NESTED_CLUSTER }} apply -f - <<EOF
          apiVersion: externaldata.gatekeeper.sh/v1beta1
          kind: Provider
          metadata:
            name: dummy-provider
          spec:
            url: https://dummy-provider.gatekeeper-system:8090/validate
            timeout: 10
            caBundle: ${CA_BUNDLE}
          EOF

          # The Provider must be accepted on the nested cluster.
          kubectl --context kind-${{ env.NESTED_CLUSTER }} get provider dummy-provider -o name || {
            echo "✗ Provider not found on nested cluster"
            exit 1
          }
          echo "✓ Provider accepted on nested cluster"

          # Wait for the ProviderPodStatus resources to appear on management
          for i in {1..60}; do
            ACTIVE=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get providerpodstatuses \
              -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.items[*].status.active}' 2>/dev/null || echo "")
            TOTAL=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get providerpodstatuses \
              -n ${{ env.GATEKEEPER_NAMESPACE }} --no-headers 2>/dev/null | wc -l)
            ACTIVE_COUNT=$(echo "$ACTIVE" | tr ' ' '\n' | grep -c true || true)
            if [[ "$TOTAL" -gt 0 && "$ACTIVE_COUNT" -eq "$TOTAL" ]]; then
              echo "✓ All $TOTAL ProviderPodStatus resources are Active on management cluster"
              break
            fi
            echo "Waiting for Active ProviderPodStatus... ($i/60) total=$TOTAL active=$ACTIVE_COUNT"
            sleep 2
          done

          TOTAL=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get providerpodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} --no-headers 2>/dev/null | wc -l)
          ACTIVE_COUNT=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get providerpodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.items[*].status.active}' 2>/dev/null | tr ' ' '\n' | grep -c true || true)
          if [[ "$TOTAL" -eq 0 || "$ACTIVE_COUNT" -ne "$TOTAL" ]]; then
            echo "✗ Expected all ProviderPodStatus Active on management (total=$TOTAL active=$ACTIVE_COUNT)"
            kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get providerpodstatuses \
              -n ${{ env.GATEKEEPER_NAMESPACE }} -o yaml || true
            exit 1
          fi

          # ProviderPodStatus must carry OwnerReferences (so GC works on pod restart).
          REFS=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get providerpodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.items[0].metadata.ownerReferences}')
          if [[ -n "$REFS" && "$REFS" != "null" ]]; then
            echo "✓ ProviderPodStatus has OwnerReferences"
          else
            echo "✗ ProviderPodStatus missing OwnerReferences"
            exit 1
          fi

          # The ProviderPodStatus must NOT exist on the nested cluster
          NESTED_PPS=$(kubectl --context kind-${{ env.NESTED_CLUSTER }} get providerpodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} --no-headers 2>/dev/null | wc -l || echo "0")
          if [[ "$NESTED_PPS" -eq 0 ]]; then
            echo "✓ No ProviderPodStatus on nested cluster"
          else
            echo "✗ Found ProviderPodStatus on nested cluster - should be on management only!"
            exit 1
          fi

      - name: Deploy webhook-only constraint to nested cluster
        run: |
          kubectl --context kind-${{ env.NESTED_CLUSTER }} apply \
            -f test/bats/tests/remote-cluster/k8srequiredlabelswebhook_template.yaml

          for i in {1..60}; do
            if kubectl --context kind-${{ env.NESTED_CLUSTER }} get crd k8srequiredlabelswebhook.constraints.gatekeeper.sh &>/dev/null; then
              echo "✓ Webhook constraint CRD created"
              break
            fi
            echo "Waiting for webhook constraint CRD... ($i/60)"
            sleep 2
          done

          kubectl --context kind-${{ env.NESTED_CLUSTER }} apply \
            -f test/bats/tests/remote-cluster/k8srequiredlabelswebhook_constraint.yaml

          for i in {1..60}; do
            ENFORCED=$(kubectl --context kind-${{ env.NESTED_CLUSTER }} get k8srequiredlabelswebhook require-webhook-label \
              -o jsonpath='{.status.byPod[0].enforced}' 2>/dev/null || echo "")
            if [[ "$ENFORCED" == "true" ]]; then
              echo "✓ Webhook-only constraint is enforced"
              break
            fi
            echo "Waiting for webhook-only constraint to be enforced... ($i/60)"
            sleep 2
          done

      - name: Test VAP enforces
        run: |
          cat > /tmp/ns-vap.yaml <<'EOF'
          apiVersion: v1
          kind: Namespace
          metadata:
            name: NAME_PLACEHOLDER
            labels:
              webhook-test: "yes"
          EOF

          SUCCESS=false
          for i in {1..30}; do
            OUT=$(sed "s/NAME_PLACEHOLDER/test-ns-vap-$i/" /tmp/ns-vap.yaml \
              | kubectl --context kind-${{ env.NESTED_CLUSTER }} create -f - 2>&1) && {
              echo "✗ Namespace was created but should have been rejected!"
              kubectl --context kind-${{ env.NESTED_CLUSTER }} delete ns test-ns-vap-$i 2>/dev/null || true
              exit 1
            }
            if echo "$OUT" | grep -q "ValidatingAdmissionPolicy"; then
              echo "✓ VAP enforced (denial attributed to ValidatingAdmissionPolicy)"
              SUCCESS=true
              break
            fi
            echo "Waiting for VAP to become the enforcing point... ($i/30) got: $OUT"
            sleep 2
          done
          if [[ "$SUCCESS" != "true" ]]; then
            echo "✗ Expected denial from ValidatingAdmissionPolicy, last got: $OUT"
            exit 1
          fi

      - name: Test webhook enforces in isolation
        run: |
          cat > /tmp/ns-webhook.yaml <<'EOF'
          apiVersion: v1
          kind: Namespace
          metadata:
            name: NAME_PLACEHOLDER
            labels:
              test-label: "yes"
          EOF

          SUCCESS=false
          for i in {1..15}; do
            if OUT=$(sed "s/NAME_PLACEHOLDER/test-ns-webhook-$i/" /tmp/ns-webhook.yaml \
              | kubectl --context kind-${{ env.NESTED_CLUSTER }} create -f - 2>&1); then
              echo "Namespace admitted; webhook-only constraint not yet served on all replicas, retrying... ($i/15)"
              kubectl --context kind-${{ env.NESTED_CLUSTER }} delete ns test-ns-webhook-$i 2>/dev/null || true
              sleep 2
              continue
            fi
            if echo "$OUT" | grep -q 'admission webhook "validation.gatekeeper.sh"'; then
              echo "✓ Webhook enforced cross-cluster (denial attributed to validation.gatekeeper.sh, VAP not in path)"
              SUCCESS=true
              break
            fi
            echo "Waiting for the webhook-only constraint to be served... ($i/15) got: $OUT"
            sleep 2
          done
          if [[ "$SUCCESS" != "true" ]]; then
            echo "✗ Expected denial from the admission webhook (namespace was admitted or denied by the wrong enforcement point)"
            exit 1
          fi

      - name: Test webhook ALLOWS compliant resource
        run: |
          kubectl --context kind-${{ env.NESTED_CLUSTER }} apply -f - <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: test-ns-allow
            labels:
              test-label: "yes"
              webhook-test: "yes"
          EOF

          echo "✓ Compliant namespace allowed"

      - name: Verify status resources are stable (no GC churn)
        run: |
          # Get the specific resource name first to avoid ordering issues
          STATUS_NAME=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constrainttemplatepodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.items[0].metadata.name}')
          
          echo "Checking stability of: $STATUS_NAME"
          
          # Get UID for that specific resource
          UID1=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constrainttemplatepodstatuses/"$STATUS_NAME" \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.metadata.uid}')
          
          echo "Initial UID: $UID1"
          sleep 2
          
          UID2=$(kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constrainttemplatepodstatuses/"$STATUS_NAME" \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o jsonpath='{.metadata.uid}')
          
          echo "UID after 2s: $UID2"
          
          if [[ "$UID1" == "$UID2" ]]; then
            echo "✓ Status resource is stable (same UID)"
          else
            echo "✗ Status resource was recreated (GC churn detected)!"
            exit 1
          fi

      - name: Save logs
        if: ${{ always() }}
        run: |
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} logs \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -l control-plane=controller-manager \
            --tail=-1 > logs-controller.json || true
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} logs \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -l control-plane=audit-controller \
            --tail=-1 > logs-audit.json || true
          kubectl --context kind-${{ env.NESTED_CLUSTER }} get constrainttemplates -o yaml > target-constrainttemplates.yaml || true
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constrainttemplatepodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o yaml > mgmt-ctpodstatuses.yaml || true
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constraintpodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o yaml > mgmt-cpodstatuses.yaml || true

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: remote-cluster-logs-${{ matrix.KUBERNETES_VERSION }}
          path: |
            logs-*.json
            target-*.yaml
            mgmt-*.yaml

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Management Cluster Pods ==="
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get pods -A || true
          
          echo ""
          echo "=== Gatekeeper Logs ==="
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} logs \
            -n ${{ env.GATEKEEPER_NAMESPACE }} deployment/gatekeeper-controller-manager \
            --tail=200 || true
          
          echo ""
          echo "=== Gatekeeper Audit Logs ==="
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} logs \
            -n ${{ env.GATEKEEPER_NAMESPACE }} deployment/gatekeeper-audit \
            --tail=200 || true
          
          echo ""
          echo "=== Nested Cluster CRDs ==="
          kubectl --context kind-${{ env.NESTED_CLUSTER }} get crds | grep gatekeeper || true
          
          echo ""
          echo "=== ConstraintTemplates ==="
          kubectl --context kind-${{ env.NESTED_CLUSTER }} get constrainttemplates -o yaml || true
          
          echo ""
          echo "=== Constraints ==="
          kubectl --context kind-${{ env.NESTED_CLUSTER }} get k8srequiredlabels -o yaml || true
          
          echo ""
          echo "=== Status Resources (Management Cluster) ==="
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constrainttemplatepodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o yaml || true
          kubectl --context kind-${{ env.MANAGEMENT_CLUSTER }} get constraintpodstatuses \
            -n ${{ env.GATEKEEPER_NAMESPACE }} -o yaml || true

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name ${{ env.MANAGEMENT_CLUSTER }} || true
          kind delete cluster --name ${{ env.NESTED_CLUSTER }} || true
          rm -rf /tmp/gk-certs /tmp/nested-kubeconfig.yaml || true

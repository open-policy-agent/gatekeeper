name: Slack Meeting Reminder

on:
  schedule:
    # Run every Wednesday at 8:30 AM Pacific Time - 1.5 hours before 10 AM meeting.
    # Both UTC hours are needed to account for daylight saving time.
    - cron: "30 15 * * 3"
    - cron: "30 16 * * 3"
    # Run every Wednesday at 12:30 PM Pacific Time - 1.5 hours before 2 PM meeting.
    # Both UTC hours are needed to account for daylight saving time.
    - cron: "30 19 * * 3"
    - cron: "30 20 * * 3"

permissions: read-all

jobs:
  send-reminder:
    runs-on: oracle-vm-2cpu-8gb-x86-64
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Determine whether to send reminder
        id: check-week
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail

          read -r schedule_minute schedule_hour schedule_dom schedule_month schedule_day <<< "$SCHEDULE"

          if [ "$schedule_minute" != "30" ] || [ "$schedule_dom" != "*" ] || [ "$schedule_month" != "*" ] || [ "$schedule_day" != "3" ]; then
            echo "unexpected schedule: $SCHEDULE" >&2
            exit 1
          fi

          scheduled_date=$(date -u +%Y-%m-%d)
          scheduled_time="${scheduled_date} ${schedule_hour}:00 UTC"
          pacific_hour=$(TZ=America/Los_Angeles date -d "$scheduled_time" +%-H)

          # Determine the alternating slot by counting whole weeks from a fixed anchor
          anchor_epoch=$(date -u -d "2026-06-17" +%s)
          today_epoch=$(date -u -d "$scheduled_date" +%s)
          week_index=$(( (today_epoch - anchor_epoch) / 604800 ))

          case "$pacific_hour" in
            8)
              scheduled_slot=odd
              ;;
            12)
              scheduled_slot=even
              ;;
            *)
              echo "Schedule $SCHEDULE maps to $pacific_hour:30 Pacific Time; skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [ $(( week_index % 2 )) -eq 0 ]; then
            expected_slot=odd
          else
            expected_slot=even
          fi

          echo "week index from anchor: $week_index, schedule slot: $scheduled_slot, expected slot: $expected_slot"
          if [ "$scheduled_slot" = "$expected_slot" ]; then
            # Resolve both meeting start times in Central European Time for the current date.
            # Computing them from the same instant keeps them DST-correct.
            morning_epoch=$(TZ=America/Los_Angeles date -d "$scheduled_date 10:00" +%s)
            afternoon_epoch=$(TZ=America/Los_Angeles date -d "$scheduled_date 14:00" +%s)
            cet_morning=$(TZ=Europe/Berlin date -d "@$morning_epoch" +%H:%M)
            cet_afternoon=$(TZ=Europe/Berlin date -d "@$afternoon_epoch" +%H:%M)
            if [ "$scheduled_slot" = "odd" ]; then
              meeting_pt="10:00"
              meeting_cet="$cet_morning"
            else
              meeting_pt="14:00"
              meeting_cet="$cet_afternoon"
            fi
            {
              echo "meeting_pt=$meeting_pt"
              echo "meeting_cet=$meeting_cet"
              echo "cet_morning=$cet_morning"
              echo "cet_afternoon=$cet_afternoon"
              echo "should_run=true"
            } >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        if: steps.check-week.outputs.should_run == 'true'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --fail \
            --data '{
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The OPA Gatekeeper weekly is today at ${{ steps.check-week.outputs.meeting_pt }} Pacific Time · ${{ steps.check-week.outputs.meeting_cet }} Central European Time!  :clock1:\n\nAdd your agenda items to the meeting notes to get your questions answered by one of the Gatekeeper maintainers.\n\n<https://docs.google.com/document/d/1A1-Q-1OMw3QODs1wT6eqfLTagcGmgzAJAjJihiO3T48/edit|Meeting Notes>"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Starting time is every Wednesday alternating between:*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "• 10:00 and 14:00 Pacific Time"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "• ${{ steps.check-week.outputs.cet_morning }} and ${{ steps.check-week.outputs.cet_afternoon }} Central European Time"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<https://zoom.us/j/332405601|Join Meeting> :point_left:"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Check out previous meetings on <https://www.youtube.com/@openpolicyagent8458|YouTube>"
                    }
                  ]
                }
              ]
            }' \
            ${{ secrets.SLACK_WEBHOOK_URL }}

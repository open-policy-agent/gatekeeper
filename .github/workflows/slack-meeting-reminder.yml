name: Slack Meeting Reminder

on:
  schedule:
    # Run every Wednesday at 9 AM Pacific Time - 1 hour before 10 AM meeting.
    # Both UTC hours are needed to account for daylight saving time.
    - cron: "0 16 * * 3"
    - cron: "0 17 * * 3"
    # Run every Wednesday at 1 PM Pacific Time - 1 hour before 2 PM meeting.
    # Both UTC hours are needed to account for daylight saving time.
    - cron: "0 20 * * 3"
    - cron: "0 21 * * 3"

permissions: read-all

jobs:
  send-reminder:
    runs-on: oracle-vm-2cpu-8gb-x86-64
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Determine whether to send reminder
        id: check-week
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail

          read -r schedule_minute schedule_hour schedule_dom schedule_month schedule_day <<< "$SCHEDULE"

          if [ "$schedule_minute" != "0" ] || [ "$schedule_dom" != "*" ] || [ "$schedule_month" != "*" ] || [ "$schedule_day" != "3" ]; then
            echo "unexpected schedule: $SCHEDULE" >&2
            exit 1
          fi

          scheduled_date=$(date -u +%Y-%m-%d)
          scheduled_time="${scheduled_date} ${schedule_hour}:00 UTC"
          pacific_hour=$(TZ=America/Los_Angeles date -d "$scheduled_time" +%-H)
          week_num=$(TZ=America/Los_Angeles date -d "$scheduled_time" +%V)
          week_num=$((10#$week_num))

          case "$pacific_hour" in
            9)
              scheduled_slot=odd
              ;;
            13)
              scheduled_slot=even
              ;;
            *)
              echo "Schedule $SCHEDULE maps to $pacific_hour:00 Pacific Time; skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [ $((week_num % 2)) -eq 0 ]; then
            expected_slot=even
          else
            expected_slot=odd
          fi

          echo "ISO week: $week_num, schedule slot: $scheduled_slot, expected slot: $expected_slot"
          if [ "$scheduled_slot" = "$expected_slot" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        if: steps.check-week.outputs.should_run == 'true'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --fail \
            --data '{
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The OPA Gatekeeper weekly is starting in 1 hour!  :clock1:\n\nAdd your agenda items to the meeting notes to get your questions answered by one of the Gatekeeper maintainers.\n\n<https://docs.google.com/document/d/1A1-Q-1OMw3QODs1wT6eqfLTagcGmgzAJAjJihiO3T48/edit|Meeting Notes>"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Starting time is every Wednesday alternating between:*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "• 10:00 and 14:00 Pacific Time"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "• 21:00 and 05:00 Central European Time"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<https://zoom.us/j/332405601|Join Meeting> :point_left:"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Check out previous meetings on <https://www.youtube.com/@openpolicyagent8458|YouTube>"
                    }
                  ]
                }
              ]
            }' \
            ${{ secrets.SLACK_WEBHOOK_URL }}

apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredlabels
  labels:
    gatekeeper.sh/tests: "yes"
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredLabels
      validation:
        openAPIV3Schema:
          type: object
          properties:
            labels:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredlabels

        violation[{"msg": msg, "details": {"missing_labels": missing}}] {
          provided := {label | input.review.object.metadata.labels[label]}
          required := {label | label := input.parameters.labels[_]}
          missing := required - provided
          count(missing) > 0
          msg := sprintf("you must provide labels: %v", [missing])
        }
      code:
        - engine: K8sNativeValidation
          source:
            generateVAP: true
            variables:
              - name: requiredLabels
                expression: "has(variables.params.labels) ? variables.params.labels : []"
            validations:
              - expression: "variables.requiredLabels.all(entry, has(object.metadata.labels) && entry in object.metadata.labels)"
                messageExpression: "'you must provide labels: ' + variables.requiredLabels.join(', ')"


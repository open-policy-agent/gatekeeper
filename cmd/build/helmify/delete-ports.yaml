kind: Deployment
apiVersion: apps/v1
metadata:
  name: gatekeeper-controller-manager
  namespace: gatekeeper-system
spec:
  template:
    spec:
      containers:
        - name: manager
          ports:
            - containerPort: 8888
              protocol: TCP
              $patch: delete
            - containerPort: 8443
              protocol: TCP
              $patch: delete
            - containerPort: 9090
              protocol: TCP
              $patch: delete
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: gatekeeper-audit
  namespace: gatekeeper-system
spec:
  template:
    spec:
      containers:
        - name: manager
          ports:
            - containerPort: 8888
              protocol: TCP
              $patch: delete
            - containerPort: 9090
              protocol: TCP
              $patch: delete
